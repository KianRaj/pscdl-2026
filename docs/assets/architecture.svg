<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Inter, sans-serif">
  <defs>
    <!-- Drop shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow head -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b1e1e"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6b6b"/>
    </marker>
    <!-- Gradients -->
    <linearGradient id="gradInput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3e8"/>
      <stop offset="100%" stop-color="#fde0c4"/>
    </linearGradient>
    <linearGradient id="gradCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbeaea"/>
      <stop offset="100%" stop-color="#f4cfcf"/>
    </linearGradient>
    <linearGradient id="gradFilter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fa"/>
      <stop offset="100%" stop-color="#cfdcf0"/>
    </linearGradient>
    <linearGradient id="gradOutput" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="gradSiamese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fbe9b4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#fafaf7"/>

  <!-- ─── Title ─────────────────────────────────────────────── -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a"
        font-family="Crimson Pro, Georgia, serif">
    Pipeline Architecture
  </text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#4a5568">
    Single video + (p, c) → per-second binary masks
  </text>

  <!-- ─── Input: Video ──────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="170" height="80" rx="10" fill="url(#gradInput)" stroke="#d97706" stroke-width="1.5"/>
    <text x="125" y="135" text-anchor="middle" font-size="15" font-weight="600" fill="#7c2d12">Input Video</text>
    <text x="125" y="156" text-anchor="middle" font-size="12" fill="#92400e">5–10 min</text>
    <text x="125" y="170" text-anchor="middle" font-size="12" fill="#92400e">+ params (p, c)</text>
  </g>

  <!-- Arrow: video → BG -->
  <path d="M 210 140 L 260 140" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── Background construction ──────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="260" y="100" width="200" height="80" rx="10" fill="#ffffff" stroke="#8b1e1e" stroke-width="1.5"/>
    <text x="360" y="129" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Clean Background</text>
    <text x="360" y="148" text-anchor="middle" font-size="11" fill="#4a5568">median of first 15 s</text>
    <text x="360" y="164" text-anchor="middle" font-size="11" fill="#4a5568" font-style="italic">brightness-normalized</text>
  </g>

  <!-- Arrow: BG → PFSM -->
  <path d="M 460 140 L 510 140" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── Dual-Background PFSM (core) ──────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="510" y="80" width="280" height="120" rx="12" fill="url(#gradCore)" stroke="#8b1e1e" stroke-width="2"/>
    <text x="650" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#8b1e1e">
      Dual-Background PFSM
    </text>
    <text x="650" y="132" text-anchor="middle" font-size="12" fill="#3a3a3a">
      bg_long (static)  +  bg_adapt (slow EMA)
    </text>
    <text x="650" y="152" text-anchor="middle" font-size="12" fill="#3a3a3a">
      per-pixel hit counter (state machine)
    </text>
    <text x="650" y="170" text-anchor="middle" font-size="11" fill="#6b6b6b" font-style="italic">
      P_fr = p × eff_fps · C_fr = c × eff_fps
    </text>
    <text x="650" y="187" text-anchor="middle" font-size="11" fill="#6b6b6b">
      confirmed when P ≤ hit &lt; C
    </text>
  </g>

  <!-- ─── Siamese ResNet50 (secondary signal) ──────────────── -->
  <g filter="url(#shadow)">
    <rect x="840" y="90" width="220" height="100" rx="10" fill="url(#gradSiamese)" stroke="#a16207" stroke-width="1.5"/>
    <text x="950" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#713f12">
      Siamese ResNet50
    </text>
    <text x="950" y="138" text-anchor="middle" font-size="11" fill="#854d0e">
      trained PSCD + VL-CMU-CD
    </text>
    <text x="950" y="155" text-anchor="middle" font-size="11" fill="#854d0e">val F1 = 0.7989</text>
    <text x="950" y="175" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">
      low-contrast OR signal
    </text>
  </g>

  <!-- Arrow: Siamese → PFSM (back arrow, dashed) -->
  <path d="M 840 140 L 790 140" stroke="#6b6b6b" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrowDashed)"/>
  <text x="815" y="132" text-anchor="middle" font-size="10" fill="#6b6b6b">OR</text>

  <!-- Arrow: PFSM → Confirmed blobs -->
  <path d="M 650 200 L 650 240" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── Confirmed blobs box ──────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="520" y="240" width="260" height="50" rx="8" fill="#ffffff" stroke="#8b1e1e" stroke-width="1.5"/>
    <text x="650" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">
      Confirmed Blobs
    </text>
    <text x="650" y="282" text-anchor="middle" font-size="11" fill="#6b6b6b">
      (connected components ≥ min_area)
    </text>
  </g>

  <!-- Arrow: → 6-filter stack -->
  <path d="M 650 290 L 650 320" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── 6-stage filter cascade ───────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="140" y="320" width="820" height="170" rx="12" fill="url(#gradFilter)" stroke="#2c5282" stroke-width="2"/>
    <text x="550" y="350" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">
      Six-Stage Filter Cascade
    </text>

    <!-- 6 filter chips -->
    <g font-size="11" fill="#1a1a1a">
      <!-- Row 1 -->
      <g>
        <rect x="170" y="370" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="180" y="389" font-weight="600" font-size="12" fill="#2c5282">① Arrival time</text>
        <text x="180" y="408">t ≥ bg_window + 5 + p ≈ 80 s</text>
      </g>
      <g>
        <rect x="430" y="370" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="440" y="389" font-weight="600" font-size="12" fill="#2c5282">② Upper-frame</text>
        <text x="440" y="408">centroid y &gt; H/8 (skips sky/banner)</text>
      </g>
      <g>
        <rect x="690" y="370" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="700" y="389" font-weight="600" font-size="12" fill="#2c5282">③ Recency %</text>
        <text x="700" y="408">newly_pct ≥ 0.30 (fresh, not aged)</text>
      </g>
      <!-- Row 2 -->
      <g>
        <rect x="170" y="430" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="180" y="449" font-weight="600" font-size="12" fill="#2c5282">④ Motion stability</text>
        <text x="180" y="468">mean Δpx &lt; 6  (vs prev frame)</text>
      </g>
      <g>
        <rect x="430" y="430" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="440" y="449" font-weight="600" font-size="12" fill="#2c5282">⑤ YOLOv8m person</text>
        <text x="440" y="468">person/blob overlap &lt; 55 %</text>
      </g>
      <g>
        <rect x="690" y="430" width="240" height="50" rx="6" fill="white" stroke="#2c5282" stroke-width="1"/>
        <text x="700" y="449" font-weight="600" font-size="12" fill="#2c5282">⑥ Spatial cooldown</text>
        <text x="700" y="468">no re-register within C s of absorb</text>
      </g>
    </g>
  </g>

  <!-- Arrow: → SAM3 -->
  <path d="M 550 490 L 550 530" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── SAM3 segmentation ────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="375" y="530" width="350" height="90" rx="12" fill="#ffffff" stroke="#8b1e1e" stroke-width="2"/>
    <text x="550" y="560" text-anchor="middle" font-size="15" font-weight="700" fill="#8b1e1e">
      SAM3 Segmentation
    </text>
    <text x="550" y="580" text-anchor="middle" font-size="11" fill="#3a3a3a">
      facebook/sam3 · 100 px margin · hit-region centroid seed
    </text>
    <text x="550" y="598" text-anchor="middle" font-size="11" fill="#3a3a3a">
      size-aware text prompt (vehicle / cart / bag / luggage)
    </text>
    <text x="550" y="614" text-anchor="middle" font-size="10" fill="#6b6b6b" font-style="italic">
      fires once per object on first activation
    </text>
  </g>

  <!-- Arrow: → output -->
  <path d="M 550 620 L 550 660" stroke="#8b1e1e" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ─── Output ───────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="420" y="660" width="260" height="46" rx="8" fill="url(#gradOutput)" stroke="#2f6c2f" stroke-width="1.5"/>
    <text x="550" y="682" text-anchor="middle" font-size="14" font-weight="600" fill="#1b5e20">
      output_masks / mask_NNNN.png
    </text>
    <text x="550" y="698" text-anchor="middle" font-size="11" fill="#2e7d32">
      one binary PNG per second  ·  full resolution
    </text>
  </g>

  <!-- ─── Legend ────────────────────────────────────────────── -->
  <g font-size="10" fill="#6b6b6b">
    <circle cx="60" cy="678" r="5" fill="url(#gradInput)" stroke="#d97706" stroke-width="1"/>
    <text x="72" y="682">Input</text>
    <circle cx="115" cy="678" r="5" fill="url(#gradCore)" stroke="#8b1e1e" stroke-width="1"/>
    <text x="127" y="682">Core PFSM</text>
    <circle cx="195" cy="678" r="5" fill="url(#gradSiamese)" stroke="#a16207" stroke-width="1"/>
    <text x="207" y="682">Trained model</text>
    <circle cx="295" cy="678" r="5" fill="url(#gradFilter)" stroke="#2c5282" stroke-width="1"/>
    <text x="307" y="682">Filters</text>
    <circle cx="362" cy="678" r="5" fill="url(#gradOutput)" stroke="#2f6c2f" stroke-width="1"/>
    <text x="374" y="682">Output</text>
  </g>
</svg>
